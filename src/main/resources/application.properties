spring.application.name=picpaysimplificado
spring.datasource.url=jdbc:mysql://mysql:3306/pagamentosimplificado?useSSL=false&serverTimezone=UTC
# RUN LOCAL
# spring.datasource.url=jdbc:mysql://localhost:3306/pagamentosimplificado?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# server.port=8081
spring.datasource.username=root
spring.datasource.password=root

# Config SMTP
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect